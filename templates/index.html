<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0 12px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
}
button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}
#result {
    margin-top: 15px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">
<form id="form">

Age:
<input type="number" name="Age" required>

<!-- ✅ FIXED SEX ENCODING -->
Sex:
<select id="sex">
  <option value="1">Male</option>
  <option value="0">Female</option>
</select>

Passenger Class:
<select id="Pclass">
  <option value="1">1st Class</option>
  <option value="2">2nd Class</option>
  <option value="3">3rd Class</option>
</select>

<!-- ✅ FIXED EMBARKED ENCODING (MOST COMMON DATASET) -->
Embarked:
<select id="embarked">
  <option value="0">S (Southampton)</option>
  <option value="1">C (Cherbourg)</option>
  <option value="2">Q (Queenstown)</option>
</select>

<button type="submit">Predict</button>
</form>

<p id="result"></p>
</div>

<script>
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  const data = {
    Age: parseFloat(document.querySelector("[name='Age']").value),
    Sex: parseInt(document.getElementById("sex").value),
    Pclass: parseInt(document.getElementById("Pclass").value),
    Embarked: parseInt(document.getElementById("embarked").value)
  };

  const res = await fetch("/predict", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();

  console.log(result);

  if (result.error) {
    document.getElementById("result").innerText = "Error: " + result.error;
    return;
  }

  let prob = result.probability_survive;

  document.getElementById("result").innerText =
    result.prediction == 1
      ? "✅ Survived" + (prob !== undefined ? ` (${prob.toFixed(2)})` : "")
      : "❌ Not Survived" + (prob !== undefined ? ` (${prob.toFixed(2)})` : "");
};
</script>

</body>
</html>
